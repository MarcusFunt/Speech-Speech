services:
  speech-speech:
    build:
      context: .
      args:
        INSTALL_ML: ${INSTALL_ML:-true}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    ports:
      - "8000:8000"
    environment:
      LOCAL_ASSISTANT_CONFIG: /config/config.yaml
      LOCAL_ASSISTANT_DATA_DIR: /data
      LOCAL_ASSISTANT_AUDIO_CACHE_DIR: /data/audio
      LOCAL_ASSISTANT_MEMORY_DB_PATH: /data/memory.sqlite3
      LOCAL_ASSISTANT_SERVER_HOST: 0.0.0.0
      LOCAL_ASSISTANT_SERVER_PORT: "8000"
      LOCAL_ASSISTANT_LLM_BASE_URL: http://host.docker.internal:11434/v1
    volumes:
      - ./docker-config:/config
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
